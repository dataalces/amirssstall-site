<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amir's Stall — drawings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="#top">Amir's Stall</a>
    <nav class="site-nav" id="site-nav">
      <a href="#gallery" class="nav-link" data-page="gallery">Gallery</a>
      <a href="#about" class="nav-link" data-page="about">About</a>
      <a href="#contact" class="nav-link" data-page="contact">Contact</a>
    </nav>
  </header>

  <main id="top">
    <!-- INTRO / HERO -->
    <section class="hero" data-panel="gallery">
      <p class="eyebrow">Drawings</p>
      <h1 class="hero-title"><span class="ital">Finished Drawings</span></h1>
      <p class="hero-intro">
        Click on images for high resolution display.
      </p>
    </section>

    <!-- GALLERY PANEL -->
    <section class="panel is-active" id="gallery" data-panel-content="gallery">
      <div class="gallery" id="gallery-grid">
        <!--
          ============================================================
          HOW TO ADD YOUR OWN DRAWINGS:
          1. Upload your image files to assets/drawings/.
          2. Use lowercase file names with hyphens, such as drawing-title.jpg.
          3. Copy one <figure> block below.
          4. Change src="..." to the image path, such as assets/drawings/drawing-title.jpg.
          5. Change the <figcaption> text to the title of the piece.
          The lightbox, zoom, and right-click-to-save all work automatically.
          ============================================================
        -->
        <figure class="art">
          <img src="assets/drawings/apostate.png" alt="Apostate" loading="lazy" />
          <figcaption>Apostate, 2024</figcaption>
        </figure>
        <figure class="art">
          <img src="assets/drawings/fishers-of-men.png" alt="Fishers of Men" loading="lazy" />
          <figcaption>Fishers of Men, 2025</figcaption>
        </figure>
        <figure class="art">
          <img src="assets/drawings/gatekeeper.png" alt="Gatekeeper" loading="lazy" />
          <figcaption>Gatekeeper, 2024</figcaption>
        </figure>
      </div>
    </section>

    <!-- ABOUT PANEL -->
    <section class="panel" id="about" data-panel-content="about">
      <div class="prose">
        <h2>About</h2>
        <p>
          I'm an electrical engineer. I enjoy drawing, writing, and gardening.
          This site serves as a platform to showcase results I think are worth sharing.
        </p>
      </div>
    </section>

    <!-- CONTACT PANEL -->
    <section class="panel" id="contact" data-panel-content="contact">
      <div class="prose">
        <h2>Contact</h2>
        <form class="contact-form" name="contact" method="POST" data-netlify="true">
          <input type="hidden" name="form-name" value="contact" />
          <input type="hidden" name="subject" value="New message from Amir's Stall" data-remove-prefix />

          <label for="contact-name">Name</label>
          <input id="contact-name" name="name" type="text" autocomplete="name" required />

          <label for="contact-email">Email</label>
          <input id="contact-email" name="email" type="email" autocomplete="email" required />

          <label for="contact-subject">Subject</label>
          <input id="contact-subject" name="message_subject" type="text" required />

          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="message" rows="7" required></textarea>

          <button type="submit">Submit</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 Amir's Stall</p>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Image viewer">
    <button class="lb-close" id="lb-close" aria-label="Close">&times;</button>
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="Previous">&#8249;</button>
    <figure class="lb-stage">
      <img id="lb-img" src="" alt="" />
      <figcaption id="lb-caption"></figcaption>
    </figure>
    <button class="lb-nav lb-next" id="lb-next" aria-label="Next">&#8250;</button>
  </div>

  <script>
    (function () {
      // ---- Tab navigation (single-page, no reload) ----
      const links = document.querySelectorAll('.nav-link');
      const panels = document.querySelectorAll('.panel');
      const hero = document.querySelector('.hero');

      function showPanel(name) {
        panels.forEach(p => p.classList.toggle('is-active', p.dataset.panelContent === name));
        links.forEach(l => l.classList.toggle('is-current', l.dataset.page === name));
        // hero only shows above the gallery
        if (hero) hero.style.display = (name === 'gallery') ? '' : 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      links.forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          showPanel(link.dataset.page);
        });
      });

      // ---- Lightbox ----
      const figures = Array.from(document.querySelectorAll('.gallery .art'));
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lb-img');
      const lbCap = document.getElementById('lb-caption');
      const btnClose = document.getElementById('lb-close');
      const btnPrev = document.getElementById('lb-prev');
      const btnNext = document.getElementById('lb-next');
      let index = 0;

      function open(i) {
        index = i;
        const img = figures[i].querySelector('img');
        const cap = figures[i].querySelector('figcaption');
        lbImg.src = img.src;
        lbImg.alt = img.alt;
        lbCap.textContent = cap ? cap.textContent : '';
        lb.classList.add('is-open');
        lb.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }
      function close() {
        lb.classList.remove('is-open');
        lb.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }
      function step(dir) {
        open((index + dir + figures.length) % figures.length);
      }

      figures.forEach((fig, i) => {
        fig.addEventListener('click', () => open(i));
      });
      btnClose.addEventListener('click', close);
      btnPrev.addEventListener('click', e => { e.stopPropagation(); step(-1); });
      btnNext.addEventListener('click', e => { e.stopPropagation(); step(1); });
      lb.addEventListener('click', e => { if (e.target === lb) close(); });

      document.addEventListener('keydown', e => {
        if (!lb.classList.contains('is-open')) return;
        if (e.key === 'Escape') close();
        if (e.key === 'ArrowLeft') step(-1);
        if (e.key === 'ArrowRight') step(1);
      });
    })();
  </script>
</body>
</html>
